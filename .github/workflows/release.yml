name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Run the full test suite before releasing ──────────────────────────────
  test:
    name: Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ── Create the GitHub Release ─────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: test           # only runs if all test matrix jobs pass
    permissions:
      contents: write     # required to create releases and upload assets

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for release notes

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release archive
        run: |
          npm pack
          mv agentforge-${{ steps.version.outputs.VERSION }}.tgz \
             agentforge-v${{ steps.version.outputs.VERSION }}.tgz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: agentforge-v${{ steps.version.outputs.VERSION }}.tgz
          fail_on_unmatched_files: true
