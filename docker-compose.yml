name: agentforge

services:
  # ── AgentForge orchestration server ────────────────────────────────────────
  agentforge:
    build: .
    ports:
      - "4242:4242"
    volumes:
      # Mount the real config file (overrides the example baked into the image)
      - ./agentforge.yml:/app/agentforge.yml:ro
      # Persist the SQLite database and any runtime state
      - ./.agentforge:/app/.agentforge
    env_file:
      - path: .env
        required: false        # Do not fail when .env is absent
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4242/api/status"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ── Ollama local-model server (optional — activate with --profile local) ───
  ollama:
    image: ollama/ollama:latest
    profiles:
      - local
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
